services:
  - type: web
    name: franchise-management-api
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .

    envVars:
      - key: SPRING_R2DBC_URL
        sync: false
      - key: SPRING_R2DBC_USERNAME
        sync: false
      - key: SPRING_R2DBC_PASSWORD
        sync: false
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: SERVER_PORT
        value: 8080
      - key: LOGGING_LEVEL_IO_R2DBC
        value: INFO
      - key: LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_DATA_R2DBC
        value: INFO

databases:
  - name: franchise-mysql
    plan: free
    databaseName: franchisedb
    user: franchiseuser